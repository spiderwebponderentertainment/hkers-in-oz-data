name: Auto Fetch Pulse Topics

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: auto-fetch-pulse-topics
  cancel-in-progress: true

jobs:
  update-json:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 下載最新代碼
        uses: actions/checkout@v4

      - name: 🐍 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 安裝需要嘅套件
        run: |
          python -m pip install --upgrade pip
          pip install cloudscraper beautifulsoup4

      - name: 🚀 執行抓取程式
        run: python workers/fetch_pulse_topics.py

      - name: 📂 檢查輸出檔案
        run: |
          ls -lah
          [ -f "topic_london_eto.json" ] && echo "找到 topic_london_eto.json"
          [ -f "topic_taipo_fire.json" ] && echo "找到 topic_taipo_fire.json"

      - name: 💾 自動 Commit 同 Push 更新
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          if [ -f "topic_london_eto.json" ]; then git add topic_london_eto.json; fi
          if [ -f "topic_taipo_fire.json" ]; then git add topic_taipo_fire.json; fi

          if git diff --cached --quiet; then
            echo "冇新變更，唔需要 commit"
          else
            git commit -m "🔄 自動更新專題新聞 JSON"
            git push
          fi
